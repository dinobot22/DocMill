# MinerU OCR 模型配置
# 两阶段推理: Layout/Vision 分析 (本地) + VLM 精细识别 (vLLM)

name: "mineru-ocr"
version: "2.5.0"
description: "MinerU OCR - 两阶段文档理解: Layout 分析 + VLM 精细识别"

pipeline: "vision_llm"
execution: "hybrid"

vision:
  framework: "torch"
  model_path: ""  # 需要用户填写本地权重路径
  device: "cuda:0"
  extra_args:
    vram_estimate_mb: 2048

llm:
  backend: "vllm"
  model_path: ""  # 需要用户填写 VLM 模型路径, 如 Qwen2-VL-7B
  api_base: ""  # 留空, 由 Orchestrator 自动注入
  max_model_len: 8192
  trust_remote_code: true
  tensor_parallel_size: 1
  extra_launch_args: []

resources:
  gpu_id: 0
  vision_vram_reserve_mb: 2048
  system_vram_reserve_mb: 2048
  gpu_memory_utilization: 0  # 0 = 自动计算
  idle_timeout_s: 1800
  watermark: 0.9

hooks:
  module: "docmill.models.mineru_ocr.hooks"
  prompt_template: ""
