# PaddleOCR-VL 模型配置
# 混合推理: Paddle Vision Encoder (本地) + vLLM VLM Decoder (sidecar)

name: "paddle-ocr-vl"
version: "1.5.0"
description: "PaddleOCR-VL - NaViT Vision Encoder + ERNIE LLM, 支持 109 种语言"

pipeline: "vision_llm"
execution: "hybrid"

vision:
  framework: "paddle"
  model_path: ""  # 需要用户填写 Vision Encoder 权重路径
  device: "cuda:0"
  extra_args:
    vram_estimate_mb: 2048

llm:
  backend: "vllm"
  model_path: ""  # 需要用户填写, 如 PaddlePaddle/PaddleOCR-VL-0.9B
  api_base: ""  # 留空, 由 Orchestrator 自动注入
  max_model_len: 4096
  trust_remote_code: true
  tensor_parallel_size: 1
  extra_launch_args:
    - "--enforce-eager"

resources:
  gpu_id: 0
  vision_vram_reserve_mb: 2048
  system_vram_reserve_mb: 2048
  gpu_memory_utilization: 0  # 0 = 自动计算
  idle_timeout_s: 1800
  watermark: 0.9

hooks:
  module: "docmill.models.paddle_ocr_vl.hooks"
  prompt_template: ""
