# DeepSeek OCR 模型配置
# 纯 vLLM 推理: DeepEncoder (Vision Compression) + MoE Decoder
# 不需要本地 Vision Worker, 全部由 vLLM 处理

name: "deepseek-ocr"
version: "1.0.0"
description: "DeepSeek OCR - 3B MoE 模型, 上下文光学压缩, 2500 tok/s (A100)"

pipeline: "llm_only"
execution: "remote"

llm:
  backend: "vllm"
  model_path: "deepseek-ai/DeepSeek-OCR"  # HuggingFace 模型名
  api_base: ""  # 留空, 由 Orchestrator 自动注入
  max_model_len: 8192
  trust_remote_code: true
  tensor_parallel_size: 1
  extra_launch_args:
    - "--enforce-eager"

resources:
  gpu_id: 0
  vision_vram_reserve_mb: 0  # 纯 vLLM, 无本地 Vision
  system_vram_reserve_mb: 2048
  gpu_memory_utilization: 0  # 0 = 自动计算
  idle_timeout_s: 1800
  watermark: 0.9

hooks:
  module: "docmill.models.deepseek_ocr.hooks"
  prompt_template: ""
